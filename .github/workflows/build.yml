name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - uses: cachix/cachix-action@v17
        with:
          name: kevinpita
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build Orca
        run: nix build .#orca --print-build-logs

      - name: Verify package contents
        run: |
          test -x ./result/bin/orca
          test -x ./result/bin/orca-ide
          readlink -f ./result/bin/orca
          readlink -f ./result/bin/orca-ide
